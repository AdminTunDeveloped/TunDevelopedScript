<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUN DEVELOPED</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@600&family=Inter&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter;
background:black;
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.main{width:100%;max-width:420px;padding:20px}

.card{
background:#020617;
border-radius:18px;
padding:30px;
box-shadow:0 0 40px rgba(0,255,150,0.2);
text-align:center;
}

.title{
font-family:Bebas Neue;
font-size:42px;
letter-spacing:4px;
background:linear-gradient(90deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8);
background-size:400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rainbow 6s linear infinite
}

@keyframes rainbow{
0%{background-position:0%}
100%{background-position:400%}
}

.online{color:#22c55e;font-weight:700}

.tag{
margin-top:6px;
font-size:12px;
color:#94a3b8
}

input,select{
width:100%;
padding:14px;
border-radius:12px;
margin-top:12px;
background:#020617;
border:1px solid #1e293b;
color:white;
font-size:14px
}

.rgb-btn{
margin-top:12px;
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#000;
color:white;
font-family:Montserrat;
font-weight:600;
cursor:pointer;
position:relative;
z-index:1;
}

.rgb-btn:before{
content:"";
position:absolute;
top:-2px;left:-2px;right:-2px;bottom:-2px;
border-radius:14px;
background:linear-gradient(45deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8);
background-size:400%;
z-index:-1;
animation:rgbmove 8s linear infinite
}

@keyframes rgbmove{
0%{background-position:0}
100%{background-position:400%}
}

.success{color:#22c55e;font-weight:700;margin-top:12px}
.error{color:#ef4444;font-weight:700;margin-top:12px}

.box{
margin-top:12px;
padding:12px;
background:#020617;
border-radius:10px;
border:1px solid #1e293b;
}

.copy{
margin-top:10px;
padding:10px;
width:100%;
border-radius:10px;
border:none;
background:#111;
color:white;
cursor:pointer;
}

.system{
margin-top:15px;
font-size:12px;
color:#94a3b8;
line-height:1.6
}
</style>
</head>

<body>

<div class="main">
<div class="card">

<div class="title">TUN DEVELOPED</div>
<p>System Status : <span class="online">ONLINE</span></p>
<div class="tag">⚡ Hệ thống tối ưu game • Bảo mật • Ổn định • Anti lag</div>

<!-- UID -->
<input id="uid-input" placeholder="Nhập UID của bạn">
<select id="uid-platform">
<option value="android">Android</option>
<option value="ios">iOS</option>
<option value="pc">PC</option>
</select>
<button class="rgb-btn" onclick="activateUID()">🚀 KÍCH HOẠT UID</button>

<!-- VIP -->
<input id="personal-key" placeholder="Nhập KEY VIP">
<select id="personal-platform">
<option value="android">Android Full</option>
<option value="ios">iOS Full</option>
<option value="pc">PC Full</option>
</select>
<button class="rgb-btn" onclick="activatePersonalKey()">💎 KÍCH HOẠT VIP</button>

<!-- FREE -->
<input id="community-key" placeholder="Nhập KEY FREE">
<button class="rgb-btn" onclick="activateCommunityKey()">🎁 NHẬN BẢN FREE</button>

<div id="result"></div>

<div class="system">
🟢 Server: Online<br>
⏰ Time: <span id="time"></span><br>
👥 Người dùng: <span id="users"></span><br>
🔐 Bảo mật: Active<br>
🚀 Version: v2.1.3
</div>

</div>
</div>

<script>

const CONFIG_URL = "https://raw.githubusercontent.com/AdminTunDeveloped/AdminTunDeveloped/main/config.json";
const KEY_URL = "https://raw.githubusercontent.com/AdminTunDeveloped/AdminTunDeveloped/main/key.json";

let CONFIG = {};
let KEY_DATA = {};

async function loadAll(){
let c = await fetch(CONFIG_URL+"?t="+Date.now());
CONFIG = await c.json();

let k = await fetch(KEY_URL+"?t="+Date.now());
KEY_DATA = await k.json();
}

function copyLink(link){
navigator.clipboard.writeText(link)
alert("📋 Đã copy link!")
}

function showResult(type, link, platform){
document.getElementById("result").innerHTML = `
<div class='success'>
${type}<br><br>

<div class="box">
📥 Link tải:<br>
<input value="${link}" readonly>
<button class="copy" onclick="copyLink('${link}')">📋 Sao chép link</button>
</div>

<div style="margin-top:8px;font-size:12px;color:#94a3b8">
Thiết bị: ${platform.toUpperCase()}<br>
Trạng thái: Đã kích hoạt thành công
</div>
</div>
`;
}

function activateUID(){
let uid=document.getElementById("uid-input").value;
let plat=document.getElementById("uid-platform").value;

if(!uid||!plat){
document.getElementById("result").innerHTML="<div class='error'>❌ Nhập UID</div>";
return;
}

let link=CONFIG.scripts[plat+"_full"];
showResult("🚀 UID Kích hoạt thành công", link, plat);
}

function activatePersonalKey(){
let key=document.getElementById("personal-key").value;
let plat=document.getElementById("personal-platform").value;

let device=navigator.userAgent;

let found=KEY_DATA.personal_keys.find(x=>x.key===key);

if(!found){
document.getElementById("result").innerHTML="<div class='error'>❌ Key sai</div>";
return;
}

if(found.platform!==plat){
document.getElementById("result").innerHTML="<div class='error'>❌ Sai nền tảng</div>";
return;
}

if(found.device && found.device!==device){
document.getElementById("result").innerHTML="<div class='error'>❌ Key đã được sử dụng</div>";
return;
}

found.device=device;

let link=CONFIG.scripts[plat+"_full"];
showResult("💎 VIP Kích hoạt thành công", link, plat);
}

function activateCommunityKey(){
let key=document.getElementById("community-key").value;

if(!KEY_DATA.community_keys.includes(key)){
document.getElementById("result").innerHTML="<div class='error'>❌ Key free sai</div>";
return;
}

let link=CONFIG.scripts.android_free;
showResult("🎁 Free kích hoạt thành công", link, "android");
}

setInterval(()=>{
document.getElementById("time").innerText=new Date().toLocaleTimeString()
},1000)

document.getElementById("users").innerText=Math.floor(Math.random()*500+200)

loadAll();

</script>

</body>
</html>
