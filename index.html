<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUN DEVELOPED</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@600&family=Inter&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter;
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.main{width:100%;max-width:420px;padding:20px}

.card{
background:#020617;
border-radius:16px;
padding:20px;
box-shadow:0 0 30px rgba(0,255,150,0.2);
text-align:center;
}

.title{
font-family:Bebas Neue;
font-size:38px;
letter-spacing:3px;
background:linear-gradient(90deg,#ff0000,#00ffd5,#7a00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tag{
margin-top:8px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
}

.tag span{
font-size:11px;
background:#020617;
padding:5px 8px;
border-radius:8px;
border:1px solid #1e293b;
color:#94a3b8;
}

.box{
margin-top:15px;
padding:14px;
border-radius:12px;
background:#020617;
border:1px solid #1e293b;
text-align:left;
}

.box h3{font-size:13px;color:#22c55e;margin-bottom:6px}

input{
width:100%;
padding:11px;
border-radius:8px;
border:1px solid #1e293b;
background:#000;
color:white;
font-size:13px
}

.rgb-btn{
margin-top:10px;
width:100%;
padding:11px;
border-radius:8px;
border:none;
background:#000;
color:white;
font-family:Montserrat;
cursor:pointer;
position:relative;
z-index:1;
}

.rgb-btn:before{
content:"";
position:absolute;
top:-2px;left:-2px;right:-2px;bottom:-2px;
border-radius:10px;
background:linear-gradient(45deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8);
background-size:400%;
z-index:-1;
animation:rgb 6s linear infinite
}

@keyframes rgb{
0%{background-position:0}
100%{background-position:400%}
}

.result{margin-top:12px;font-size:13px}
.success{color:#22c55e}
.error{color:#ef4444}

.linkbox{
margin-top:8px;
padding:8px;
background:#000;
border-radius:8px;
border:1px solid #1e293b;
}

.history{
margin-top:12px;
padding:10px;
border-radius:10px;
background:#020617;
border:1px solid #1e293b;
font-size:12px;
text-align:left;
}

.history-item{
margin-top:6px;
padding:6px;
border-bottom:1px solid #1e293b;
}

.fab{
position:fixed;
bottom:18px;
right:18px;
width:45px;
height:45px;
border-radius:50%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.fab:before{
content:"";
position:absolute;
top:-2px;left:-2px;right:-2px;bottom:-2px;
border-radius:50%;
background:linear-gradient(45deg,#ff0000,#00ffd5,#7a00ff);
background-size:400%;
animation:rgb 6s linear infinite;
z-index:-1;
}

.menu{
position:fixed;
bottom:70px;
right:18px;
display:flex;
flex-direction:column;
gap:6px;
opacity:0;
pointer-events:none;
transition:.2s;
}

.menu a{
text-decoration:none;
text-align:center;
font-size:12px;
padding:8px;
border-radius:8px;
background:#000;
color:white;
position:relative;
}

.menu a:before{
content:"";
position:absolute;
top:-2px;left:-2px;right:-2px;bottom:-2px;
border-radius:10px;
background:linear-gradient(45deg,#ff0000,#00ffd5,#7a00ff);
background-size:400%;
animation:rgb 6s linear infinite;
z-index:-1;
}

.menu.show{opacity:1;pointer-events:auto}

</style>
</head>

<body>

<div class="main">
<div class="card">

<div class="title">TUN DEVELOPED</div>

<div class="tag">
<span>🟢 Server Online</span>
<span>🔐 Bảo mật</span>
<span>🚀 Hiệu suất cao</span>
</div>

<div class="box">
<h3>💎 KEY VIP</h3>
<input id="vip" placeholder="Nhập KEY VIP">
<button class="rgb-btn" onclick="vip()">Kích hoạt</button>
</div>

<div class="box">
<h3>🎁 KEY FREE</h3>
<input id="free" placeholder="Nhập KEY FREE">
<button class="rgb-btn" onclick="freeKey()">Nhận Free</button>
</div>

<div id="result" class="result"></div>
<div id="history" class="history"></div>

</div>
</div>

<div class="fab" onclick="toggle()">💬</div>

<div id="menu" class="menu">
<a href="#">Zalo</a>
<a href="#">Telegram</a>
<a href="#">Facebook</a>
</div>

<script>

const CONFIG_URL="https://raw.githubusercontent.com/AdminTunDeveloped/TunDev/main/config.json";
const KEY_URL="https://raw.githubusercontent.com/AdminTunDeveloped/TunDev/main/key.json";

let CONFIG={},KEY_DATA={};
let history=JSON.parse(localStorage.getItem("his"))||[];

async function load(){
CONFIG=await (await fetch(CONFIG_URL)).json();
KEY_DATA=await (await fetch(KEY_URL)).json();
}

function save(type,link){
history.unshift({type,link});
if(history.length>10)history.length=10;
localStorage.setItem("his",JSON.stringify(history));
render();
}

function render(){
let h=document.getElementById("history");
if(history.length==0){h.innerHTML="📜 Chưa có lịch sử";return;}

h.innerHTML="<b>📜 Lịch sử:</b>"+history.map((i,idx)=>`
<div class="history-item">
${i.type}
<button class="rgb-btn" onclick="copy('${i.link}')">COPY</button>
</div>`).join("");
}

function copy(t){
navigator.clipboard.writeText(t);
alert("Đã copy link");
}

function show(type,link){
document.getElementById("result").innerHTML=`
<div class="success">${type}
<div class="linkbox">
<input value="${link}" readonly>
<button class="rgb-btn" onclick="copy('${link}')">COPY</button>
</div>
</div>`;
}

function vip(){
let k=document.getElementById("vip").value.trim();
let obj=KEY_DATA.personal_keys.find(x=>x.key==k);
if(!obj) return err("Key sai");

let link=CONFIG.scripts[obj.platform+"_full"];
save("💎 VIP",link);
show("Kích hoạt VIP thành công",link);
}

function freeKey(){
let k=document.getElementById("free").value.trim();
if(!KEY_DATA.community_keys.includes(k)) return err("Key sai");

let link=CONFIG.scripts.android_free;
save("🎁 FREE",link);
show("Nhận FREE thành công",link);
}

function err(t){
document.getElementById("result").innerHTML="<div class='error'>"+t+"</div>";
}

function toggle(){
document.getElementById("menu").classList.toggle("show");
}

load();
render();

</script>

</body>
</html>
